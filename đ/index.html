<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm Đạt Khôn Hay Ngu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <div id="screen-quiz" class="card">
            <div class="quiz-header">
                <div class="timer">⏳ Thời gian: <span id="timeLeft">60:00</span></div>
                <div class="score-live">Tiến độ: <span id="progressText">0/60</span></div>
            </div>

            <div id="audio-feedback" class="feedback-box"></div>

            <div class="quiz-layout">
                <div class="quiz-main">
                    <div id="questionText" class="question-box">Đang tải câu hỏi...</div>
                    <div id="answerArea" class="answer-grid"></div>
                    <div class="quiz-nav">
                        <button id="btnPrev" class="btn-sub">← Câu trước</button>
                        <button id="btnNext" class="btn-sub">Câu tiếp →</button>
                    </div>
                </div>

                <div class="quiz-sidebar">
                    <h3>Sơ đồ câu hỏi</h3>
                    <div id="questionsGrid" class="grid-box"></div>
                    <button id="btnSubmit" class="btn btn-danger">🚀 NỘP BÀI THI</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
