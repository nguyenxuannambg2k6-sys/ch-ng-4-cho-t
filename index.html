<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm Đạt Khôn Hay Ngu</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-color: #ffffff;
            --primary-color: #3b82f6;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* Khung hiển thị thông báo phản hồi */
        .feedback-box {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .feedback-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .feedback-danger {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .quiz-layout {
            display: flex;
            gap: 30px;
        }

        .quiz-main {
            flex: 2;
        }

        .quiz-sidebar {
            flex: 1;
            border-left: 1px solid var(--border-color);
            padding-left: 25px;
        }

        .question-box {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .answer-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .answer-option {
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .answer-option:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
        }

        .answer-option.selected-wrong {
            background: #fee2e2;
            border-color: #f87171;
            color: #991b1b;
        }

        .answer-option.selected-correct {
            background: #dcfce7;
            border-color: #4ade80;
            color: #166534;
        }

        .quiz-nav {
            display: flex;
            justify-content: space-between;
        }

        .btn, .btn-sub {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-sub {
            background: #e2e8f0;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .grid-box {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .grid-item {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            background: #f8fafc;
        }

        .grid-item.active {
            border: 2px solid var(--primary-color);
        }

        .grid-item.done {
            background: #e2e8f0;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .quiz-layout { flex-direction: column; }
            .quiz-sidebar { border-left: none; padding-left: 0; border-top: 1px solid var(--border-color); padding-top: 20px; }
            .grid-box { grid-template-columns: repeat(8, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="screen-quiz" class="card">
            <div class="quiz-header">
                <div class="timer">⏳ Thời gian còn lại: <span id="timeLeft">60:00</span></div>
                <div class="score-live">Tiến độ: <span id="progressText">0/60</span></div>
            </div>

            <div id="audio-feedback" class="feedback-box">Bấm vào một đáp án để kiểm tra!</div>

            <div class="quiz-layout">
                <div class="quiz-main">
                    <div id="questionText" class="question-box">Đang tải dữ liệu câu hỏi...</div>
                    <div id="answerArea" class="answer-grid"></div>
                    <div class="quiz-nav">
                        <button id="btnPrev" class="btn-sub">← Câu trước</button>
                        <button id="btnNext" class="btn-sub">Câu tiếp →</button>
                    </div>
                </div>

                <div class="quiz-sidebar">
                    <h3>Sơ đồ câu hỏi</h3>
                    <div id="questionsGrid" class="grid-box"></div>
                    <button id="btnSubmit" class="btn btn-danger">🚀 NỘP BÀI THI LÊN CLOUD</button>
                </div>
            </div>
        </div>
    </div>

        const examQuestions = [

            { question: "Theo 5S thì SEIRI (Sàng lọc) là?", answers: ["Là giữ vệ sinh nơi làm việc của mình sao cho không có rác rưởi trên sàn nhà, gầm máy… và không có bụi bẩn bám trên máy móc, thiết bị và các dụng cụ…", "Giảm lãng phí nguyên vật liệu rơi vãi, hỏng... do bảo quản và lưu kho không đúng cách", "Là phân loại và loại bỏ các đồ vật không cần thiết tại nơi làm việc.", "Giúp loại bỏ tức thời các lãng phí nguyên vật liệu, điện, nước, không gian làm việc"], correct: 2 },

            let textToSpeak = "";
            feedbackBox.className = "feedback-box";

                textToSpeak = "Đạt cũng khôn đấy";

            // Kích hoạt tính năng đọc giọng nói tự động của trình duyệt web
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Tắt dòng âm thanh cũ ngay lập tức
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'vi-VN'; // Ngôn ngữ Tiếng Việt
                utterance.rate = 1.0;     // Tốc độ bình thường
                window.speechSynthesis.speak(utterance);
            }
        }

        // ==========================================
        // 5. RENDER LOGIC CÂU HỎI VÀ Ô LƯỚI ĐIỀU HƯỚNG
        // ==========================================
        function hiểnThịCâuHỏi(index) {
            currentIndex = index;
            const item = examQuestions[index];
            
            document.getElementById('progressText').textContent = `${Object.keys(userAnswers).length}/${examQuestions.length}`;
            document.getElementById('questionText').textContent = `Câu ${index + 1}: ${item.question}`;
            
            // Đổi viền ô lưới câu hỏi đang được chọn
            document.querySelectorAll('.grid-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            const answerArea = document.getElementById('answerArea');
            answerArea.innerHTML = ""; 

            item.answers.forEach((ans, slot) => {
                const div = document.createElement('div');
                div.className = 'answer-option';
                
                // Nếu Đạt đã bấm chọn đáp án cho câu hỏi này rồi -> Khóa và hiện màu kết quả
                if (userAnswers[index] !== undefined) {
                    if (slot === item.correct) {
                        div.classList.add('selected-correct'); // Màu xanh lá cho đáp án đúng chuẩn
                    } else if (userAnswers[index] === slot) {
                        div.classList.add('selected-wrong'); // Màu đỏ cho đáp án Đạt chọn sai
                    }
                }
                
                div.textContent = ans;
                
                // Đón sự kiện click
                div.addEventListener('click', () => {
                    if (userAnswers[index] === undefined) {
                        userAnswers[index] = slot;
                        
                        // Đẩy tiến độ thi realtime lên Cloud Firebase của bạn
                        db.ref(`rooms/${roomCode}/states`).set(userAnswers);
                        
                        const isCorrect = (slot === item.correct);
                        playVoiceFeedback(isCorrect); // Gọi hàm phát âm thanh AI
                        
                        hiểnThịCâuHỏi(index); // Vẽ lại câu hỏi hiện tại
                        
                        const gridCell = document.getElementById(`grid-cell-${index}`);
                        if (gridCell) gridCell.classList.add('done');
                    }
                });
                answerArea.appendChild(div);
            });
        }

        function khởiTạoSơĐồLướiCâuHỏi() {
            const grid = document.getElementById('questionsGrid');
            grid.innerHTML = "";
            examQuestions.forEach((_, i) => {
                const cell = document.createElement('div');
                cell.className = 'grid-item';
                cell.id = `grid-cell-${i}`;
                cell.textContent = i + 1;
                cell.addEventListener('click', () => hiểnThịCâuHỏi(i));
                grid.appendChild(cell);
            });
        }

        // Sự kiện các nút bấm tiến lùi câu hỏi
        document.getElementById('btnPrev').addEventListener('click', () => {
            if (currentIndex > 0) hiểnThịCâuHỏi(currentIndex - 1);
        });
        document.getElementById('btnNext').addEventListener('click', () => {
            if (currentIndex < examQuestions.length - 1) hiểnThịCâuHỏi(currentIndex + 1);
        });

        // ==========================================
        // 6. ĐỒNG HỒ ĐẾM NGƯỢC VÀ CHẤM ĐIỂM CHUNG CUỘC
        // ==========================================
        function bắtĐầuĐếmNgược(seconds) {
            const timerDisplay = document.getElementById('timeLeft');
            let duration = seconds;
            
            timerInterval = setInterval(() => {
                let mins = Math.floor(duration / 60);
                let secs = duration % 60;
                
                timerDisplay.textContent = `${mins < 10 ? "0" + mins : mins}:${secs < 10 ? "0" + secs : secs}`;
                
                if (--duration < 0) {
                    clearInterval(timerInterval);
                    xửLýTínhĐiểmNộpBài();
                }
            }, 1000);
        }

        document.getElementById('btnSubmit').addEventListener('click', () => {
            if (confirm("Bạn có chắc chắn muốn nộp bài thi ngay lập tức không?")) {
                clearInterval(timerInterval);
                xửLýTínhĐiểmNộpBài();
            }
        });

        function xửLýTínhĐiểmNộpBài() {
            let score = 0;
            examQuestions.forEach((item, i) => {
                if (userAnswers[i] === item.correct) score++;
            });

            const finalGrade = ((score / examQuestions.length) * 10).toFixed(2);

            // Đẩy điểm số tổng kết lên lưu vĩnh viễn trong Firebase của bạn
            db.ref(`rooms/${roomCode}/final_results`).set({
                correctCount: score,
                grade: finalGrade,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                // Hiển thị màn hình kết quả điểm số lên trình duyệt
                document.getElementById('screen-quiz').innerHTML = `
                    <div style="text-align: center; padding: 40px 10px;">
                        <h2 style="color: #2563eb; font-size: 2rem; margin-bottom: 20px;">KẾT QUẢ THI ĐÃ ĐỒNG BỘ CLOUD</h2>
                        <p style="font-size: 1.3rem;">Số câu trả lời đúng: <strong>${score} / 60 câu</strong></p>
                        <div style="font-size: 3.5rem; font-weight: 900; color: #ef4444; margin: 25px 0;">${finalGrade} Điểm</div>
                        <button onclick="location.reload()" class="btn" style="background:#3b82f6; color:white; padding: 12px 25px;">🔄 LÀM LẠI BÀI THI</button>
                    </div>
                `;
            });
        }

        // Tự động kích hoạt ngay khi mở trang web lên
        khởiTạoSơĐồLướiCâuHỏi();
        hiểnThịCâuHỏi(0);
        bắtĐầuĐếmNgược(3600); // 60 phút làm bài thi
    </script>
</body>
</html>
